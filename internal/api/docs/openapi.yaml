openapi: 3.0.3
info:
  title: LLM Decision Engine API
  version: 1.0.0
  description: API for converting unstructured decision questions into structured decision models.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/decision/analyze:
    post:
      summary: Analyze a decision question
      operationId: analyzeDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Structured decision model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Decision extraction or validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AnalyzeRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          example: Should I stop being a mobile developer and move into AI?
    AnalyzeResponse:
      type: object
      required:
        - decision
      properties:
        decision:
          $ref: '#/components/schemas/Decision'
    Decision:
      type: object
      required:
        - problem_definition
        - decision_type
        - options
        - key_factors
        - risks
        - unknowns
        - recommended_next_questions
      properties:
        problem_definition:
          type: string
          example: Should I stop being a mobile developer and move into AI?
        decision_type:
          type: string
          example: Career Change
        options:
          type: array
          items:
            type: string
          example:
            - Stay as a Mobile Developer
            - Move into AI
        key_factors:
          type: array
          items:
            type: string
          example:
            - Skill Set
            - Financial Gain
            - Personal Interest
            - Job Security
        risks:
          type: array
          items:
            type: string
          example:
            - Loss of Current Income
            - Steep Learning Curve
            - Uncertainty in Future Demand
        unknowns:
          type: array
          items:
            type: string
          example:
            - Current Demand for AI Talent
            - Time and Effort Required to Adapt
        recommended_next_questions:
          type: array
          items:
            type: string
          example:
            - What are the current demand and salary ranges for AI developers in my location?
            - How much time and effort will it take to adapt my skill set to AI?
            - What are the potential career growth opportunities in AI?
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: invalid request body
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
