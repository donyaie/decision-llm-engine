openapi: 3.0.3
info:
  title: LLM Decision Engine API
  version: 1.0.0
  description: API for converting unstructured decision questions into structured decision models.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/decision/analyze:
    post:
      summary: Analyze a decision question
      operationId: analyzeDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Structured decision model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Decision extraction or validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AnalyzeRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          example: Should I switch from mobile development to AI/LLM engineering?
    AnalyzeResponse:
      type: object
      required:
        - decision
      properties:
        decision:
          $ref: '#/components/schemas/Decision'
    Decision:
      type: object
      required:
        - problem_definition
        - decision_type
        - options
        - key_factors
        - risks
        - unknowns
        - recommended_next_questions
      properties:
        problem_definition:
          type: string
          example: Switching from mobile development to AI/LLM engineering
        decision_type:
          type: string
          example: career
        options:
          type: array
          items:
            type: string
          example:
            - Transition into AI/LLM engineering
            - Stay in mobile development
        key_factors:
          type: array
          items:
            type: string
          example:
            - market demand
            - learning curve
            - portfolio readiness
            - income stability
            - long-term career growth
        risks:
          type: array
          items:
            type: string
          example:
            - temporary productivity dip
            - shallow domain knowledge
            - slower-than-expected job transition
        unknowns:
          type: array
          items:
            type: string
          example:
            - time needed to become job-ready
            - availability of AI/LLM roles
            - salary impact during transition
        recommended_next_questions:
          type: array
          items:
            type: string
          example:
            - What AI/LLM skills are most required for target roles?
            - How long will it take to build a credible portfolio?
            - Can the transition start inside the current role?
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: invalid request body
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
